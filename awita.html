<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compra Awita de Manantial</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: black;
      color: white;
      font-family: 'Arial', sans-serif;
      text-align: center;
    }

    h1 {
      font-size: 3em;
      margin-top: 100px;
      animation: colorchange 5s infinite;
    }

    @keyframes colorchange {
      0%   { color: #ff0000; }
      25%  { color: #00ff00; }
      50%  { color: #0000ff; }
      75%  { color: #ffff00; }
      100% { color: #ff00ff; }
    }

    p {
      font-size: 1.2em;
      margin-top: 20px;
      color: #ccc;
    }

    .btn {
      display: inline-block;
      margin-top: 40px;
      padding: 15px 40px;
      background: linear-gradient(45deg, #00c6ff, #0072ff);
      color: white;
      text-decoration: none;
      font-size: 20px;
      border-radius: 10px;
      transition: transform 0.3s ease, background 0.3s ease;
    }

    .btn:hover {
      transform: scale(1.1);
      background: linear-gradient(45deg, #ff6a00, #ee0979);
    }

    footer {
      margin-top: 100px;
      font-size: 0.9em;
      color: #888;
    }
  </style>
</head>
<body>
  <h1>Compra Awita de Manantial</h1>
  <p>El agua más pura y refrescante, directo a tu pantalla.</p>
  <a href="https://youtube.com/shorts/doTJoxibZdw?si=Ta5oOQNXCiwza-ue" class="btn">COMPRAR</a>
  
  <footer>
    © 2026 VendoAguaa - Todos los derechos reservados
  </footer>
</body>
</html>
